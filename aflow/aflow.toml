[aflow]
# Default workflow used when the CLI does not name one.
default_workflow = "medium"
# Keep this many run directories under `.aflow/runs/` before pruning the oldest.
keep_runs = 20
# Hard turn cap for a run. `--max-turns` can override this for a single invocation.
max_turns = 15
# Retry a clean harness exit that leaves the plan in inconsistent checkpoint state this many times.
retry_inconsistent_checkpoint_state = 1
# Show at most this many changed files in the live banner before collapsing the list.
banner_files_limit = 10
# max_same_step_turns limits how many consecutive turns the same workflow step
# can be selected before the run fails. Applies only to multi-step workflows.
# Set to 0 to disable. Default: 5.
max_same_step_turns = 5

# Role name used for the merge handoff agent. Resolved through the effective team first,
# then global [roles]. Required for any workflow that uses merge teardown.
team_lead = "senior_architect"

# Prefix template for feature branch names. Combined with a sanitized plan stem and timestamp.
branch_prefix = "aflow"
# Prefix template for worktree directory names. Same sanitization rules as branch_prefix.
worktree_prefix = "aflow"
# Root directory where linked worktrees are created. Must not be inside the primary repo root.
worktree_root = "~/code/worktrees"


#### HARNESS PROFILES ####

# Harness profiles map a harness name to the model and effort values it should run.
[harness.opencode.profiles.turbo]
# The harness model identifier for this profile.
model = "zai-coding-plan/glm-5-turbo"

[harness.opencode.profiles.glm47]
# The harness model identifier for this profile.
model = "zai-coding-plan/glm-4.7"

[harness.claude.profiles.opus]
# The harness model identifier for this profile.
model = "opus"
# Optional effort setting passed through to harnesses that support it.
effort = "medium"

[harness.claude.profiles.sonnet]
# The harness model identifier for this profile.
model = "sonnet"

[harness.claude.profiles.haiku]
# The harness model identifier for this profile.
model = "haiku"

[harness.codex.profiles.high]
# The harness model identifier for this profile.
model = "gpt-5.4"
# Optional effort setting passed through to harnesses that support it.
effort = "high"

[harness.codex.profiles.mini]
# The harness model identifier for this profile.
model = "gpt-5.4-mini"
# Optional effort setting passed through to harnesses that support it.

[harness.codex.profiles.nano]
# The harness model identifier for this profile.
model = "gpt-5.4-mini"
effort = "none"

[harness.reasonix.profiles.flash]
# The harness model identifier for this profile.
model = "deepseek-flash"

[harness.reasonix.profiles.pro]
# The harness model identifier for this profile.
model = "deepseek-pro"

[harness.reasonix.profiles.flash-max]
# The harness model identifier for this profile.
model = "deepseek-flash-max"

[harness.reasonix.profiles.pro-max]
# The harness model identifier for this profile.
model = "deepseek-pro-max"


#### Roles & Teams ####

# Global role-to-selector mappings. Team overrides can replace a subset of these.
[roles]
architect = 'claude.opus'
senior_architect = 'codex.high'
worker = 'claude.haiku'
reviewer = 'claude.sonnet'

# Team-specific role overrides live under [teams.<name>.roles]. Missing roles fall back
# to the global [roles] map. backup_team names the next team to try for harness recovery.
[teams.codex1]
backup_team = '7teen'

[teams.codex1.roles]
architect = 'codex.high'
senior_architect = 'codex.high'
reviewer = 'codex.high'
worker = 'codex.mini'

[teams.7teen]

[teams.7teen.roles]
architect = 'codex.mini'
reviewer = 'codex.mini'
worker = 'codex.nano'


