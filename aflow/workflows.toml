#### WORKFLOWS ####

# Default lifecycle settings inherited by all workflows that do not override them.
[workflow]
setup = ["worktree", "branch"]
teardown = ["merge", "rm_worktree"]
main_branch = "main"

# Ralph loop, single-step implementation with no review phase.
[workflow.ralph.steps.implement_plan]
# The step runs under a role. The selected team decides which selector that role maps to at runtime.
role = "worker"
# Prompt keys are rendered in order.
prompts = ["cp_loop_implementation"]
# Transition rules are checked top to bottom. Each rule uses a `to` target and an optional `when` condition.
go = [
  { to = "END", when = "DONE || MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]

# Alias workflow, inherits `ralph` steps but runs branch-only lifecycle with a per-workflow merge prompt.
# Alias workflows can also use `exclude = ["step_name"]` to keep declared steps visible in `aflow show`
# while removing them from the executable graph.



# Review, implement, then squash approved follow-up work into one final commit.
[workflow.review_implement_review.steps.review_plan]
role = "architect"
prompts = ["review_plan"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]

[workflow.review_implement_review.steps.implement_plan]
role = "worker"
prompts = ["implementation_plans", "cp_loop_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "review_implementation", when = "DONE" },
  { to = "implement_plan" },
]

[workflow.review_implement_review.steps.review_implementation]
role = "reviewer"
prompts = ["review_plans","review_squash"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan", when = "NEW_PLAN_EXISTS" },
  { to = "END" },
]


# Review each checkpoint, then do a final no-squash audit of the finished plan.
[workflow.review_implement_cp_review.steps.review_plan]
role = "architect"
prompts = ["review_plan"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan" },
]

[workflow.review_implement_cp_review.steps.implement_plan]
role = "worker"
prompts = ["implementation_plans", "cp_loop_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "review_cp_implementation" },
]

[workflow.review_implement_cp_review.steps.review_cp_implementation]
role = "reviewer"
prompts = ["review_plans","review_cp"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "implement_plan", when = "NEW_PLAN_EXISTS || !DONE" },
  { to = "final_review" },
]

# Final review against the original plan before any optional follow-up work.
[workflow.review_implement_cp_review.steps.final_review]
role = "architect"
prompts = ["review_plans","final_review"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "followup", when = "NEW_PLAN_EXISTS" },
  { to = "END" },
]

[workflow.review_implement_cp_review.steps.followup]
role = "senior_architect"
prompts = ["implementation_plans", "followup_implementation"]
go = [
  { to = "END", when = "MAX_TURNS_REACHED" },
  { to = "final_review" },
]

# Alias workflows
[workflow.hard]
extends = "review_implement_cp_review"

[workflow.medium]
extends = "review_implement_review"


